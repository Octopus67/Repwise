name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel stale runs on the same PR/branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Shared env for all test jobs — includes hardened settings.py requirements
env:
  DATABASE_URL: "sqlite+aiosqlite:///./test.db"
  JWT_SECRET: "ci-test-secret-key-not-for-production-use-only"
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "15"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  DEBUG: "true"
  # Hardened settings.py validators require these in non-debug mode,
  # but DEBUG=true bypasses them. Set anyway for documentation.
  CORS_ORIGINS: '["http://localhost:8081"]'
  ALLOWED_HOSTS: '["localhost"]'
  REDIS_URL: ""

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run ruff check
        run: ruff check src/ tests/
      - name: Run ruff format check
        run: ruff format --check src/ tests/

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run mypy
        run: mypy src/

  security-scan:
    name: Security Scan (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-
      - name: Install dependencies
        run: pip install -e ".[dev]" pip-audit
      - name: Audit dependencies for known vulnerabilities
        run: pip-audit --strict --desc
      # Audit fix 10.21 — SAST via Bandit
      - name: Run Bandit SAST scan
        run: pip install bandit && bandit -r src/ -ll -c .bandit

  unit-tests:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: |
          pytest tests/ -v \
            --ignore=tests/test_*_properties.py \
            --tb=short \
            --durations=20 \
            -q

  property-tests:
    name: Property Tests (hypothesis)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run property tests
        run: |
          pytest tests/test_*_properties.py -v \
            --tb=short \
            --durations=20 \
            -q

  coverage:
    name: Coverage Check (>80%)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-
      - name: Install dependencies
        run: pip install -e ".[dev]" pytest-cov
      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            --durations=20 \
            --tb=short
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Archive coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  migration-test:
    name: Migration Round-Trip (Alembic)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run migrations up
        run: alembic upgrade head
      - name: Run migrations down
        run: alembic downgrade base
      - name: Run migrations up again
        run: alembic upgrade head

  pr-size:
    name: PR Size Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check PR diff size
        run: |
          LINES=$(git diff --stat origin/${{ github.base_ref }}...HEAD | tail -1 | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
          DELETIONS=$(git diff --stat origin/${{ github.base_ref }}...HEAD | tail -1 | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo 0)
          TOTAL=$((${LINES:-0} + ${DELETIONS:-0}))
          echo "PR size: $TOTAL lines changed"
          if [ "$TOTAL" -gt 500 ]; then
            echo "::warning::Large PR detected ($TOTAL lines). Consider splitting into smaller PRs."
          fi
