[build]
builder = "DOCKERFILE"

[deploy]
startCommand = "alembic upgrade head && gunicorn -w ${WEB_CONCURRENCY:-1} -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:${PORT:-8000} --forwarded-allow-ips='*' --timeout 120 --graceful-timeout 30 --keep-alive 5 src.main:app"
healthcheckPath = "/api/v1/health"
# 120s needed: alembic migration + gunicorn boot + neon cold start
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
